<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#451a03"/>
      <stop offset="60%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
    
    <!-- Gold metallic gradient -->
    <linearGradient id="goldBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Glowing amber neon gradient -->
    <linearGradient id="neonAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <linearGradient id="laserGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <!-- Advanced Glow Filters -->
    <filter id="epicGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

    <style>
    .gavel-base {
      transform-origin: 190px 300px;
    }

    .wave {
      display: none;
    }

    .hud-ring-1 {
      transform-origin: 256px 256px;
    }

    .hud-ring-2 {
      transform-origin: 256px 256px;
    }
  </style>

  <!-- Base Cyber Background -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>
  
  <!-- Outer Cyber Border -->
  <rect width="504" height="504" x="4" y="4" rx="86" fill="none" stroke="#1e293b" stroke-width="3"/>
  <rect width="504" height="504" x="4" y="4" rx="86" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4" filter="url(#epicGlow)"/>

  <!-- Ambient Light Pulse -->
  <circle cx="256" cy="256" r="180" fill="#f59e0b" opacity="0.3" filter="url(#epicGlow)" class="ambient-glow"/>

  <!-- HUD Rotator 1 -->
  <g class="hud-ring-1" opacity="0.25">
    <circle cx="256" cy="256" r="220" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="100 40 20 40 80 50"/>
    <circle cx="256" cy="256" r="200" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="10 15 30 10"/>
    <path d="M 256,16 L 256,36 M 256,476 L 256,496 M 16,256 L 36,256 M 476,256 L 496,256" stroke="#f59e0b" stroke-width="3"/>
  </g>

  <!-- HUD Rotator 2 -->
  <g class="hud-ring-2" opacity="0.3">
    <circle cx="256" cy="256" r="170" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="50 150 10 30"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5 10 20 40"/>
  </g>

  <!-- Striking Gavel Ripple (Triggered on Strike strike point 190, 320) -->
  <circle cx="190" cy="320" r="20" fill="none" stroke="#fbbf24" stroke-width="4" class="wave" filter="url(#epicGlow)"/>
  <circle cx="190" cy="320" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" class="wave"/>

  <!-- Floating Main Composition -->
  <g class="floater">
    <!-- Abstract ZK Shield in Background -->
    <path d="M156,140 Q256,100 356,140 L356,280 Q256,400 156,280 Z" fill="none" stroke="url(#neonAmber)" stroke-width="8" opacity="0.25" filter="url(#epicGlow)"/>
    <path d="M156,140 Q256,100 356,140 L356,280 Q256,400 156,280 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

    <!-- Gavel Block -->
    <polygon points="130,320 250,320 230,340 150,340" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="4" stroke-linejoin="round" filter="url(#epicGlow)"/>
    <polygon points="130,320 250,320 230,340 150,340" fill="#0f172a" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>

    <!-- Gavel Base Assembly (Group animated to strike) -->
    <g class="gavel-base">
      <!-- Gavel Handle -->
      <path d="M190,300 L320,170" fill="none" stroke="url(#goldBody)" stroke-width="16" stroke-linecap="round" filter="url(#epicGlow)"/>
      <path d="M190,300 L320,170" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>

      <!-- Gavel Head (Cylinder) -->
      <g transform="translate(190,300) rotate(-45)">
        <!-- Back-layer group for the clean unified glow (AURA) of the TUBE -->
        <g filter="url(#epicGlow)">
          <ellipse cx="-40" cy="0" rx="14" ry="24" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="3"/>
          <rect x="-40" y="-24" width="80" height="48" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="3"/>
          <ellipse cx="40" cy="0" rx="14" ry="24" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="3"/>
          <rect x="-4" y="-24" width="8" height="48" fill="#fbbf24"/>
        </g>
        
        <!-- Front-layer group for the crisp details of the TUBE (no filter) -->
        <g>
          <ellipse cx="-40" cy="0" rx="14" ry="24" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="1.5"/>
          <rect x="-40" y="-24" width="80" height="48" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="1.5"/>
          <rect x="-40" y="-24" width="80" height="48" fill="none" stroke="#ffffff" stroke-width="1.5"/>
          <ellipse cx="40" cy="0" rx="14" ry="24" fill="url(#goldBody)" stroke="#f59e0b" stroke-width="1.5"/>
          <ellipse cx="40" cy="0" rx="14" ry="24" fill="none" stroke="#ffffff" stroke-width="1.5"/>
          <rect x="-4" y="-24" width="8" height="48" fill="#fbbf24"/>
        </g>
      </g>
    </g>
  </g>
</svg>